name: Publish NuGet Package

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      VERSION: ""
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore LeetCodeUtils.sln

      - name: Build
        run: dotnet build LeetCodeUtils.sln -c Release --no-restore

      - name: Test
        run: dotnet test LeetCodeUtils.sln -c Release --no-build

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Validate NuGet API key
        run: |
          if [ -z "${NUGET_API_KEY}" ]; then
            echo "NUGET_API_KEY secret is required for publishing to NuGet.org." >&2
            exit 1
          fi

      - name: Pack
        run: dotnet pack src/LeetCodeUtils/LeetCodeUtils.csproj -c Release -p:PackageVersion=${{ env.VERSION }} -o ./artifacts

      - name: Publish to NuGet.org
        run: dotnet nuget push "./artifacts/*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key "${NUGET_API_KEY}" --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.nupkg
